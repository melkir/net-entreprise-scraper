name: CI

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Test and build
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
          targets: wasm32-unknown-unknown

      - name: Cache Rust dependencies and tools
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: worker
          add-job-id-key: "false"

      - name: Check formatting
        run: cargo fmt --all --check

      - name: Run tests
        run: cargo test --locked

      - name: Run Clippy for the Worker target
        run: cargo clippy --locked --target wasm32-unknown-unknown -- -D warnings

      - name: Validate production Worker
        uses: cloudflare/wrangler-action@v4
        with:
          command: deploy --dry-run

  deploy:
    name: Deploy Worker
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Restore Rust dependencies and tools
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: worker
          add-job-id-key: "false"

      - name: Deploy Worker
        uses: cloudflare/wrangler-action@v4
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          command: deploy
